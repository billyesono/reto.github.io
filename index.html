<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hot Challenge Extreme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div id="setup-screen" class="screen active">
            <header>
                <h1>HOT <span class="pink"> +18</span></h1>
                <p class="subtitle">EXTREMO & SEXUAL</p>
                 <p class="subtitle">Creado X JM</p>
            </header>
            
            <div class="registration-box">
                <p>Añade a los jugadores:</p>
                <div class="input-group">
                    <input type="text" id="player-name" placeholder="Escribe un nombre...">
                    <button id="add-player-btn">+</button>
                </div>
                <ul id="player-list"></ul>
            </div>

            <button id="start-game-btn" class="main-btn" disabled>EMPEZAR JUEGO</button>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-header">
                <span class="turn-label">TURNO DE:</span>
                <div id="current-player">---</div>
            </div>
            
            <div class="challenge-card">
                <p id="challenge-text">¡Prepárate!</p>
            </div>

            <button id="next-turn-btn" class="main-btn">SIGUIENTE RETO 🔥</button>
            <button id="back-to-setup" class="text-btn">Editar jugadores</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
